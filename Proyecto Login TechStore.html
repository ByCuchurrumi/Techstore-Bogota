<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TechStore - Sistema</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #141e30, #243b55);
    margin: 0;
    color: #333;
}

.container {
    width: 350px;
    margin: 60px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 95%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #243b55;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #141e30;
}

.hidden {
    display: none;
}

.error {
    color: red;
    font-size: 14px;
}

.success {
    color: green;
}

table {
    width: 100%;
    margin-top: 10px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 5px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
    <h2>TechStore - Login</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <p class="error" id="errorLogin"></p>
    <button onclick="login()">Ingresar</button>
</div>

<!-- MENU -->
<div class="container hidden" id="menu">
    <h2>Menú Principal</h2>
    <button onclick="mostrar('productos')">Registrar Producto</button>
    <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- PRODUCTOS -->
<div class="container hidden" id="productos">
    <h2>Registro de Productos</h2>

    <input type="text" id="nombre" placeholder="Nombre del producto">
    <input type="number" id="precio" placeholder="Precio">
    <input type="number" id="stock" placeholder="Stock">
    
    <p class="error" id="errorProducto"></p>
    <button onclick="agregarProducto()">Guardar</button>
    <button onclick="volverMenu()">Volver</button>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody id="tablaProductos"></tbody>
    </table>
</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];

function login() {
    let user = document.getElementById("user").value.trim();
    let pass = document.getElementById("pass").value.trim();

    let usuarioCorrecto = "EstudianteUniminuto";
    let contraseñaCorrecta = "Natty1996";

    if(user === "" || pass === "") {
        document.getElementById("errorLogin").innerText = "Complete todos los campos";
        return;
    }

    if(user !== usuarioCorrecto || pass !== contraseñaCorrecta) {
        document.getElementById("errorLogin").innerText = "Usuario o contraseña incorrectos";
        return;
    }

    document.getElementById("errorLogin").innerText = "";
    cambiarVista("login", "menu");
}

function mostrar(vista) {
    cambiarVista("menu", vista);
}

function volverMenu() {
    cambiarVista("productos", "menu");
}

function agregarProducto() {
    let nombre = document.getElementById("nombre").value.trim();
    let precio = document.getElementById("precio").value;
    let stock = document.getElementById("stock").value;

    if(nombre === "" || precio === "" || stock === "") {
        document.getElementById("errorProducto").innerText = "Complete todos los campos";
        return;
    }

    document.getElementById("errorProducto").innerText = "";

    let producto = { nombre, precio, stock };
    productos.push(producto);
    localStorage.setItem("productos", JSON.stringify(productos));

    actualizarTabla();

    document.getElementById("nombre").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("stock").value = "";
}

function actualizarTabla() {
    let tabla = document.getElementById("tablaProductos");
    tabla.innerHTML = "";

    productos.forEach(p => {
        tabla.innerHTML += `
            <tr>
                <td>${p.nombre}</td>
                <td>${p.precio}</td>
                <td>${p.stock}</td>
            </tr>
        `;
    });
}

function logout() {
    cambiarVista("menu", "login");

    document.getElementById("user").value = "";
    document.getElementById("pass").value = "";
}

function cambiarVista(actual, siguiente) {
    document.getElementById(actual).classList.add("hidden");
    document.getElementById(siguiente).classList.remove("hidden");
}

window.onload = function() {
    actualizarTabla();
};

</script>

</body>
</html>
